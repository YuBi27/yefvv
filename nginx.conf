user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting for webhook endpoint
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

    # HTTP → HTTPS redirect + certbot challenge
    server {
        listen 80;
        server_name yefvv.site www.yefvv.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — main server
    server {
        listen 443 ssl http2;
        server_name yefvv.site www.yefvv.site;

        ssl_certificate     /etc/letsencrypt/live/yefvv.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yefvv.site/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Telegram webhook
        location /webhook {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass         http://bot:8000/webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # REST API (FastAPI)
        location /api/ {
            proxy_pass         http://api:8001/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # FastAPI Swagger docs
        location /docs {
            proxy_pass         http://api:8001/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass         http://api:8001/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://api:8001/health;
        }

        location / {
            return 404;
        }
    }
}
